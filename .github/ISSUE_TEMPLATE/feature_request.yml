name: Feature request
description: Suggest an improvement or new capability for Haro Desktop Pet
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want to see added or changed?
      placeholder: A clear and concise description of the feature.
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What problem does this solve, or what workflow does it improve?
      placeholder: Describe the situation and why it matters.
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like the solution to look like?
      placeholder: Describe a concrete approach, UI/behavior, config changes, etc.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds you considered?
      placeholder: List alternatives and why they’re not ideal.
    validations:
      required: false
