name: Bug report
description: Report a problem or unexpected behavior in Haro Desktop Pet
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? Include any relevant context.
      placeholder: A clear and concise description of the bug.
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: How can we reproduce the issue?
      placeholder: |
        1. Open the app
        2. Configure Telegram integration
        3. ...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen.
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened (include error messages if any).
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - Windows
        - macOS
        - Other
    validations:
      required: false

  - type: input
    id: python_version
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.10.x"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / recordings (optional)
      description: Drag & drop images/videos here, if helpful.
    validations:
      required: false
